manifest:
  projects:
    # Full example workspace manifest.
    # The README only shows the pulse-sdk stanza users add to an existing
    # manifest, but this example must also fetch Zephyr itself.
    - name: zephyr
      url: https://github.com/zephyrproject-rtos/zephyr.git
      revision: main
      import: true
    - name: pulse-sdk
      url: https://github.com/libmcu/pulse-sdk.git
      path: modules/lib/pulse-sdk
      revision: main

  self:
    path: app
